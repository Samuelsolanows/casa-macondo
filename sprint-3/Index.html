<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casa Macondo - Bienvenidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/home.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-menu nav-left">
        <a href="actividades.html">Actividades</a>
        <a href="alojamientos.html">Alojamiento</a>
        <a href="emprendimientos.html">Emprendimientos</a>
        <a href="eventos.html">Eventos</a>
      </nav>

      <div class="logo">
        <a href="#"><img src="img/LogoGrande.png" alt="Casa Macondo Logo" /></a>
      </div>

      <nav class="nav-menu nav-right">
        <button class="btn-reservar">Reservar</button>
        <a href="#menu" class="menu-toggle">
          <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
          MENÚ
        </a>
      </nav>
    </header>

    <main class="hero-container">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="hero-title">Bienvenidos a Casa Macondo</h1>
        
        <form class="booking-search-bar" id="bookingForm" onsubmit="event.preventDefault(); window.location.href='alojamientos.html';">
          <!-- Check-in Field -->
          <div class="booking-field date-field" id="Field_ida">
            <span class="field-value" id="Val_ida">Abr 25, 2026</span>
            <input type="date" id="Input_ida" class="hidden-date-input" />
          </div>

          <!-- Arrow -->
          <div class="arrow-container">
            <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" width="60" height="24" viewBox="0 0 60 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="55" y2="12"></line>
              <polyline points="48 5 55 12 48 19"></polyline>
            </svg>
          </div>

          <!-- Check-out Field -->
          <div class="booking-field date-field" id="Field_regreso">
            <span class="field-value" id="Val_regreso">Abr 25, 2026</span>
            <input type="date" id="Input_regreso" class="hidden-date-input" />
          </div>

          <!-- Separator Line -->
          <div class="vertical-line"></div>

          <!-- Promo Code Field -->
          <div class="booking-field promo-field">
            <input type="text" placeholder="Codigo promocional" id="Promo_code" class="promo-input" />
          </div>

          <!-- Search Button -->
          <button type="submit" class="btn-buscar" aria-label="Buscar Reservas">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </form>
      </div>
    </main>

    <!-- Modal overlay container -->
    <div class="modal-overlay" id="authModal">
      <div class="modal-card">
        <!-- Close Button -->
        <button class="modal-close-btn" id="closeModalBtn" aria-label="Cerrar ventana">&times;</button>
        
        <!-- Left Column (Form) -->
        <div class="modal-left">
          <!-- Register Form -->
          <div class="auth-view" id="registerView">
            <h2 class="auth-title">Registro</h2>
            <form class="auth-form" id="registerForm">
              <div class="input-group">
                <label for="regName">Nombre</label>
                <div class="input-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                  <input type="text" id="regName" placeholder="Nombre completo" required />
                </div>
              </div>

              <div class="input-group">
                <label for="regEmail">Correo</label>
                <div class="input-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                  <input type="email" id="regEmail" placeholder="correo@ejemplo.com" required />
                </div>
              </div>

              <div class="input-group">
                <label for="regPassword">Contraseña</label>
                <div class="input-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                  <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required />
                </div>
              </div>

              <div class="input-group">
                <label for="regConfirmPassword">Confirmar contraseña</label>
                <div class="input-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path><path d="M12 15v3"></path></svg>
                  <input type="password" id="regConfirmPassword" placeholder="Repite tu contraseña" required />
                </div>
              </div>

              <div class="input-group">
                <label for="regPhone">Teléfono</label>
                <div class="input-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                  <input type="tel" id="regPhone" placeholder="Ej: +57 300 123 4567" required />
                </div>
              </div>

              <button type="submit" class="btn-confirmar">Confirmar</button>
            </form>
            <div class="auth-switch">
              <span>¿Ya tienes una cuenta? <button type="button" class="btn-switch-view" id="toLoginBtn">Inicia sesión</button></span>
            </div>
          </div>

          <!-- Login Form (Initially Hidden) -->
          <div class="auth-view hidden" id="loginView">
            <h2 class="auth-title">Iniciar Sesión</h2>
            <form class="auth-form" id="loginForm">
              <div class="input-group">
                <label for="loginEmail">Correo</label>
                <div class="input-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                  <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" required />
                </div>
              </div>

              <div class="input-group">
                <label for="loginPassword">Contraseña</label>
                <div class="input-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                  <input type="password" id="loginPassword" placeholder="Ingresa tu contraseña" required />
                </div>
              </div>

              <button type="submit" class="btn-confirmar">Ingresar</button>
            </form>
            <div class="auth-switch">
              <span>¿No tienes una cuenta? <button type="button" class="btn-switch-view" id="toRegisterBtn">Regístrate</button></span>
            </div>
          </div>
        </div>

        <!-- Right Column (Image/Identity) -->
        <div class="modal-right">
          <img src="img/logo_beige.png" alt="Casa Macondo Logo" class="modal-logo" />
        </div>
      </div>
    </div>

    <!-- Scripts externos -->
    <script src="js/datepicker.js" defer></script>
    <script src="js/modal.js" defer></script>
  </body>
</html>
